version: "3.9"

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yandex_parser
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
    working_dir: /var/www/html
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "18080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - php

  node:
    image: nginx:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/frontend-nginx:/etc/nginx/conf.d:ro
    ports:
      - "15173:80"

  playwright:
    build:
      context: .
      dockerfile: docker/playwright/Dockerfile
    working_dir: /app
    volumes:
      - ./parser:/app
    ports:
      - "13000:3000"
    command: sh -c "npm install && npm run build && node dist/server.js"

volumes:
  mysql_data: